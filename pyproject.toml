[project]
name = "stockwise"
version = "0.4.0"
description = "巴菲特/林奇范式 A 股 + 港股价值投资分析工具：5 类行业 profile + 5 数据源 + 行动建议 + watchlist 监控"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "akshare>=1.18",
    "anthropic>=0.98",
    "openai>=1.40",
    "baostock>=0.8",
    "yfinance>=0.2",
    "tushare>=1.4",
    "click>=8.1",
    "jinja2>=3.1",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
stockwise = "stockwise.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["stockwise*"]

[tool.setuptools.package-data]
stockwise = ["report/*.j2"]
