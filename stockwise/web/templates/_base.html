<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>{% block title %}stockwise{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
           max-width: 1200px; margin: 30px auto; padding: 0 20px; color: #333; }
    h1 { border-bottom: 2px solid #4f46e5; padding-bottom: 8px; }
    nav { margin-bottom: 24px; }
    nav a { margin-right: 16px; color: #4f46e5; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-weight: 600; }
    tr:hover { background: #fef3c7; }
    .high { color: #dc2626; font-weight: 600; }
    .medium { color: #d97706; }
    .ok { color: #16a34a; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 3px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
             font-size: 0.85em; background: #e0e7ff; color: #4338ca; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <nav>
    <a href="/">📋 watchlist</a>
    <a href="/portfolio">💼 portfolio</a>
    <a href="https://github.com/cindylui479-create/stockwise" target="_blank">GitHub</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
